<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>dos-audit-console alpine demo</title>
  <link rel="stylesheet" href="../../dist/dos-audit-console.css">
  <script defer src="../../dist/dos-audit-console.iife.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
  <script>
    document.addEventListener('alpine:init', () => {
      DosAuditConsole.registerAlpine(Alpine);
    });
  </script>
</head>
<body style="background:#111;min-height:100vh">
  <div x-data="dosAuditConsole({ logsUrl: '../vanilla-standalone/mock-logs.json', infoUrl: null })" x-init="init()">
    <div class="dos-console" :class="console.minimized ? 'is-minimized' : ''"
         @click="if (console.minimized) console.minimized = false">
      <div class="dos-header" @click.stop="console.minimized = !console.minimized">
        <div class="dos-header-left">
          <div class="notif-light" :class="console.notifClass"></div>
          <span x-show="!console.minimized" x-text="title"></span>
          <span x-show="console.minimized">C:\</span>
        </div>
        <div class="dos-header-actions" x-show="!console.minimized">
          <button type="button" @click.stop="copyConsole()">📋</button>
          <button type="button" @click.stop="clearConsole()">🗑️</button>
          <span>[-]</span>
        </div>
      </div>
      <div class="dos-body" id="dos-body" x-show="!console.minimized">
        <template x-for="(log, index) in console.logs" :key="index">
          <div class="dos-line">
            <span class="dos-line-time" x-text="log.time"></span>
            <span :class="'dos-msg-' + log.type" x-text="log.msg"></span>
          </div>
        </template>
        <div class="dos-prompt">
          <span class="dos-prompt-gt">&gt;</span>
          <input type="text" x-model="console.input" @keydown.enter="onCommand()">
          <div class="dos-cursor"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
